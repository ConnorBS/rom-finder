name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
      - feature/modular-sources
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref_name == 'feature/modular-sources' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # secrets context is not available in job-level if; expose via env and check at step level
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
    steps:
      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "value=latest" >> $GITHUB_OUTPUT
          else
            echo "value=dev" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Unraid redeploy
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          TAG=${{ steps.tag.outputs.value }}
          curl -f -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST \
            -H "X-Deploy-Token: $DEPLOY_WEBHOOK_TOKEN" \
            "$DEPLOY_WEBHOOK_URL?tag=$TAG" \
          && echo " - redeploy triggered (tag: $TAG)" \
          || echo "Webhook call failed (server may be unreachable)"
