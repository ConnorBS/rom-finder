name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
      - feature/modular-sources
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev,enable=${{ github.ref_name == 'feature/modular-sources' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Deploy on every push to either branch so Unraid always gets the latest build
    if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
    steps:
      - name: Trigger Unraid redeploy
        run: |
          curl -f -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
          && echo " — redeploy triggered" \
          || echo "Webhook call failed (server may be unreachable)"
