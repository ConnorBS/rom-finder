services:
  rom-finder:
    build: .
    container_name: rom-finder
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DEBUG=false
      - DB_URL=sqlite:////data/rom_finder.db
      - DOWNLOAD_DIR=/roms
      - CHECK_DIR=/rom-check
    volumes:
      - rom-finder-data:/data
      - rom-finder-covers:/app/static/covers
      - /mnt/user/ROMs:/roms         # Unraid: final ROMs library share
      - /mnt/ssd_cache/Media/ROMs:/rom-check   # Unraid: review/staging folder

volumes:
  rom-finder-data:
  rom-finder-covers:
