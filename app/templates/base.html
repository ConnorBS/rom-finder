<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ROM Finder{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* HTMX loading states */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }
        .htmx-request .htmx-label { display: none; }
    </style>
</head>
<body class="dark bg-gray-950 text-gray-100 flex min-h-screen">

    <!-- Mobile backdrop — tapping closes sidebar -->
    <div id="nav-backdrop"
         class="fixed inset-0 bg-black/60 z-20 hidden md:hidden"
         onclick="closeSidebar()"></div>

    <!-- Sidebar — always fixed, never in normal flow -->
    <aside id="sidebar"
           class="fixed inset-y-0 left-0 z-30
                  w-52 h-screen bg-gray-900 border-r border-gray-800 flex flex-col
                  -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out">

        <div class="flex-shrink-0 h-14 flex items-center px-5 border-b border-gray-800">
            <span class="font-bold text-white tracking-wide">ROM Finder</span>
            <!-- Close button — mobile only -->
            <button onclick="closeSidebar()"
                    class="ml-auto md:hidden text-gray-500 hover:text-white p-1 -mr-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="flex-1 min-h-0 overflow-y-auto p-3 space-y-0.5 text-sm">
            <a href="/collection" class="nav-item block px-3 py-2 rounded-md text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">Collection</a>
            <a href="/search"     class="nav-item block px-3 py-2 rounded-md text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">Search</a>
            <a href="/downloads"  class="nav-item block px-3 py-2 rounded-md text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">Downloads</a>
            <a href="/settings"   class="nav-item block px-3 py-2 rounded-md text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">Settings</a>
            <a href="/scheduler"  class="nav-item block px-3 py-2 rounded-md text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">Scheduler</a>
            <a href="/logs"       class="nav-item block px-3 py-2 rounded-md text-gray-400 hover:bg-gray-800 hover:text-white transition-colors">Logs</a>
        </nav>

        <!-- Activity tray — polls every 3s, capped height, independent scroll -->
        <div class="flex-shrink-0 overflow-y-auto" style="max-height: 45vh">
            <div
                id="activity-tray"
                hx-get="/activity/tray"
                hx-trigger="load, every 3s"
                hx-swap="innerHTML"
            ></div>
        </div>
    </aside>

    <!-- Page wrapper — offset by sidebar width on desktop -->
    <div class="flex-1 flex flex-col min-w-0 md:ml-52">

        <!-- Mobile top bar with hamburger -->
        <header class="md:hidden h-14 flex items-center gap-3 px-4 bg-gray-900 border-b border-gray-800 flex-shrink-0">
            <button onclick="openSidebar()" class="text-gray-400 hover:text-white p-1 -ml-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <span class="font-bold text-white tracking-wide">ROM Finder</span>
        </header>

        <main class="flex-1 overflow-y-auto">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function openSidebar() {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('nav-backdrop').classList.remove('hidden');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('nav-backdrop').classList.add('hidden');
        }

        // Highlight the active nav link
        document.querySelectorAll('.nav-item').forEach(function(link) {
            var href = link.getAttribute('href');
            var path = window.location.pathname;
            var match = path === href || (href !== '/collection' && href !== '/search' && path.startsWith(href));
            if (match) {
                link.classList.add('bg-gray-800', 'text-white');
                link.classList.remove('text-gray-400');
            }
        });
    </script>
</body>
</html>
